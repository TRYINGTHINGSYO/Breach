<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BREACH — Tactical FPS</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Barlow Condensed',sans-serif;margin:0;}
canvas{display:block;position:absolute;top:0;left:0;}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
#crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);transition:transform 0.08s cubic-bezier(0.2,0.8,0.2,1),opacity 0.1s;z-index:10;}
#crosshair.shoot{transform:translate(-50%,-50%) scale(1.35);}
#crosshair svg{display:block;filter:drop-shadow(0 0 3px rgba(255,255,255,0.4));}
#vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,0.65) 100%);pointer-events:none;}
#scanlines{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;opacity:0.4;}
#dmg-overlay{position:absolute;inset:0;background:rgba(200,20,20,0);pointer-events:none;}
#dmg-overlay.pulse{animation:dmgPulse 0.35s ease-out;}
@keyframes dmgPulse{0%{background:rgba(220,30,30,0.45);}100%{background:rgba(200,20,20,0);}}
#health-bar{height:4px;background:linear-gradient(90deg,#c9a227,#e8c547);transition:width 0.3s,background 0.5s;box-shadow:0 0 8px rgba(232,197,71,0.3);}
#health-bar.low{animation:healthPulse 0.8s ease-in-out infinite;}
@keyframes healthPulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
#muzzle{position:absolute;bottom:32%;left:54%;width:80px;height:80px;transform:translate(-50%,-50%);opacity:0;pointer-events:none;background:radial-gradient(circle,rgba(255,240,150,0.9) 0%,rgba(255,160,40,0.4) 40%,transparent 70%);}
#muzzle.flash{opacity:1;animation:muzzlePop 0.1s ease-out;}
@keyframes muzzlePop{0%{transform:translate(-50%,-50%) scale(0.4);}100%{transform:translate(-50%,-50%) scale(1.2);}}
#overlay{position:absolute;inset:0;background:#050608;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:all;z-index:100;overflow:hidden;}
#menu-bg{position:absolute;inset:0;background:linear-gradient(135deg,#0a0e18 0%,#121a2e 50%,#0a0e18 100%);opacity:1;}
#menu-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(232,197,71,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(232,197,71,0.04) 1px,transparent 1px);background-size:48px 48px;animation:gridDrift 20s linear infinite;}
@keyframes gridDrift{0%{transform:perspective(500px) rotateX(60deg) translateY(0);}100%{transform:perspective(500px) rotateX(60deg) translateY(48px);}}
#menu-glow{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(232,197,71,0.08) 0%,transparent 70%);top:20%;pointer-events:none;}
#overlay::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 0%,rgba(232,197,71,0.04) 50%,transparent 100%);animation:menuScan 4s linear infinite;pointer-events:none;}
#overlay.hidden{display:none;}
.menu-content{position:relative;z-index:2;text-align:center;}
.menu-logo{font-size:72px;font-weight:900;letter-spacing:-4px;color:#fff;line-height:1;margin-bottom:4px;animation:logoGlow 3s ease-in-out infinite;}
.menu-logo span{color:#e8c547;}
@keyframes logoGlow{0%,100%{text-shadow:0 0 40px rgba(232,197,71,0.1);}50%{text-shadow:0 0 80px rgba(232,197,71,0.3);}}
@keyframes menuScan{0%{transform:translateY(-100%);}100%{transform:translateY(100%);}}
.menu-sub{color:#888;font-size:13px;letter-spacing:5px;text-transform:uppercase;margin-bottom:28px;}
.menu-btn{background:rgba(0,0,0,0.4);border:1px solid rgba(232,197,71,0.45);color:#e8c547;padding:14px 52px;font-family:inherit;font-size:15px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;margin:6px;transition:all 0.2s;display:block;width:280px;margin-left:auto;margin-right:auto;}
.menu-btn:hover{background:rgba(232,197,71,0.12);border-color:#e8c547;box-shadow:0 0 30px rgba(232,197,71,0.25);transform:translateY(-1px);}
.menu-btn.primary{border-color:#e8c547;background:rgba(232,197,71,0.08);}
.menu-input{background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:12px 18px;font-family:inherit;font-size:17px;width:280px;text-align:center;margin-bottom:20px;outline:none;}
.menu-input:focus{border-color:#e8c547;box-shadow:0 0 12px rgba(232,197,71,0.2);}
.menu-hints{margin-top:28px;color:#555;font-size:12px;letter-spacing:1px;line-height:1.8;max-width:360px;}
.menu-hints kbd{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);padding:2px 6px;border-radius:3px;color:#888;font-size:11px;}
.menu-footer{position:absolute;bottom:16px;color:#444;font-size:11px;letter-spacing:2px;}
#death-overlay{position:absolute;inset:0;background:rgba(40,0,0,0.75);display:none;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:50;}
#death-overlay.show{display:flex;animation:deathIn 0.5s ease-out;}
@keyframes deathIn{0%{opacity:0;}100%{opacity:1;}}
.death-text{font-size:72px;font-weight:900;color:#ef4444;letter-spacing:-2px;text-transform:uppercase;text-shadow:0 0 40px rgba(239,68,68,0.5);}
#respawn-timer{font-size:18px;color:#aaa;margin-top:12px;letter-spacing:2px;}
#hud-top{position:absolute;top:16px;left:0;right:0;display:flex;justify-content:center;gap:48px;align-items:center;}
.score-box{text-align:center;min-width:80px;}
.score-val{font-size:42px;font-weight:900;color:#fff;line-height:1;}
.score-label{font-size:10px;letter-spacing:3px;color:#666;text-transform:uppercase;margin-top:2px;}
.score-val.atk{color:#ef4444;text-shadow:0 0 20px rgba(239,68,68,0.3);}
.score-val.def{color:#3b82f6;text-shadow:0 0 20px rgba(59,130,246,0.3);}
#hud-mid{position:absolute;top:50px;left:50%;transform:translateX(-50%);font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.35);}
#hud-bottom{position:absolute;bottom:24px;left:24px;right:24px;display:flex;justify-content:space-between;align-items:flex-end;}
#health-wrap{width:220px;}
#health-label{font-size:11px;letter-spacing:2px;color:#888;margin-bottom:6px;}
#health-track{height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;}
#ammo-wrap{text-align:right;}
#ammo-val{font-size:32px;font-weight:700;color:#fff;}
#ammo-reserve{font-size:13px;color:#666;}
#weapon-name{font-size:11px;letter-spacing:3px;color:#e8c547;text-transform:uppercase;margin-bottom:4px;}
#reload-bar{display:none;height:2px;background:rgba(232,197,71,0.3);margin-top:6px;border-radius:1px;overflow:hidden;}
#reload-fill{height:100%;width:0;background:#e8c547;transition:width 0.05s linear;}
#weapon-slots{display:flex;gap:6px;margin-top:8px;justify-content:flex-end;}
.slot{width:28px;height:28px;border:1px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:11px;color:#666;}
.slot.active{border-color:#e8c547;color:#e8c547;background:rgba(232,197,71,0.1);}
#minimap{position:absolute;bottom:88px;right:24px;width:168px;height:168px;}
#minimap canvas{border:1px solid rgba(232,197,71,0.25);box-shadow:0 4px 24px rgba(0,0,0,0.6);}
#killfeed{position:absolute;top:64px;right:24px;text-align:right;max-width:280px;}
.kill-entry{font-size:13px;color:#aaa;margin:3px 0;padding:4px 8px;background:rgba(0,0,0,0.35);animation:killIn 0.3s ease-out;}
.kill-entry .killer{color:#e8c547;}
.kill-entry .victim{color:#ef4444;}
.kill-entry .hs{color:#f5c518;font-weight:700;}
@keyframes killIn{from{opacity:0;transform:translateX(16px);}to{opacity:1;transform:translateX(0);}}
#hitmarker{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0;font-size:26px;font-weight:900;color:#fff;pointer-events:none;z-index:11;}
#hitmarker.hs{color:#f5c518;font-size:34px;}
#compass{position:absolute;top:18px;left:50%;transform:translateX(-50%);font-size:12px;letter-spacing:4px;color:rgba(255,255,255,0.45);font-weight:600;}
#ping{position:absolute;top:18px;right:24px;font-size:11px;letter-spacing:1px;color:#666;}
#ping.good{color:#4ade80;}
#ping.mid{color:#facc15;}
#ping.bad{color:#ef4444;}
#team-badge{position:absolute;top:18px;left:24px;font-size:11px;letter-spacing:2px;padding:4px 10px;border:1px solid;}
#team-badge.attack{color:#ef4444;border-color:rgba(239,68,68,0.4);background:rgba(239,68,68,0.1);}
#team-badge.defend{color:#3b82f6;border-color:rgba(59,130,246,0.4);background:rgba(59,130,246,0.1);}
#ads-overlay{display:none;position:absolute;inset:0;pointer-events:none;box-shadow:inset 0 0 0 2px rgba(232,197,71,0.15);}
#ads-overlay::before,#ads-overlay::after{content:'';position:absolute;top:0;bottom:0;width:18%;background:rgba(0,0,0,0.75);}
#ads-overlay::before{left:0;}
#ads-overlay::after{right:0;}
#gameover{position:absolute;inset:0;background:rgba(0,0,0,0.88);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:80;pointer-events:all;}
#gameover.show{display:flex;}
#scoreboard{position:absolute;inset:0;background:rgba(0,0,0,0.82);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:60;pointer-events:none;}
#scoreboard.show{display:flex;}
.sb-title{font-size:14px;letter-spacing:4px;color:#666;margin-bottom:16px;}
.sb-table{width:480px;border-collapse:collapse;}
.sb-table th,.sb-table td{padding:8px 12px;text-align:left;font-size:14px;border-bottom:1px solid rgba(255,255,255,0.06);}
.sb-table th{color:#888;font-size:11px;letter-spacing:2px;text-transform:uppercase;}
.sb-table .bot-row{opacity:0.75;}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <div id="vignette"></div>
  <div id="scanlines"></div>
  <div id="dmg-overlay"></div>
  <div id="crosshair">
    <svg width="24" height="24" viewBox="0 0 24 24"><line x1="12" y1="2" x2="12" y2="8" stroke="white" stroke-width="1.5"/><line x1="12" y1="16" x2="12" y2="22" stroke="white" stroke-width="1.5"/><line x1="2" y1="12" x2="8" y2="12" stroke="white" stroke-width="1.5"/><line x1="16" y1="12" x2="22" y2="12" stroke="white" stroke-width="1.5"/></svg>
  </div>
  <div id="hitmarker">✕</div>
  <div id="muzzle"></div>
  <div id="team-badge" class="attack">ATTACK</div>
  <div id="hud-top">
    <div class="score-box"><div class="score-val atk" id="score-atk">0</div><div class="score-label">Attack</div></div>
    <div class="score-box"><div class="score-val def" id="score-def">0</div><div class="score-label">Defend</div></div>
  </div>
  <div id="hud-mid">FIRST TO 30</div>
  <div id="compass">N</div>
  <div id="killfeed"></div>
  <div id="ping">— ms</div>
  <div id="hud-bottom">
    <div id="health-wrap">
      <div id="health-label">HEALTH <span id="health-val">100</span></div>
      <div id="health-track"><div id="health-bar" style="width:100%"></div></div>
    </div>
    <div id="ammo-wrap">
      <div id="weapon-name">M4A1</div>
      <div><span id="ammo-val">30</span> <span id="ammo-reserve">/ 90</span></div>
      <div id="reload-bar"><div id="reload-fill"></div></div>
      <div id="weapon-slots">
        <div class="slot active" data-w="m4a1">1</div>
        <div class="slot" data-w="pistol">2</div>
        <div class="slot" data-w="dmr">3</div>
      </div>
    </div>
  </div>
  <div id="minimap"><canvas id="mm" width="168" height="168"></canvas></div>
  <div id="ads-overlay"></div>
  <div id="death-overlay">
    <div class="death-text">KIA</div>
    <div id="respawn-timer">Respawning in 5…</div>
  </div>
  <div id="scoreboard">
    <div class="sb-title">SCOREBOARD — TAB</div>
    <table class="sb-table"><thead><tr><th>Name</th><th>K</th><th>D</th><th>Team</th></tr></thead><tbody id="sb-body"></tbody></table>
  </div>
  <div id="gameover">
    <div class="menu-logo" id="go-title">VICTORY</div>
    <p id="go-sub" style="color:#888;margin:8px 0 24px"></p>
    <button class="menu-btn" onclick="showMenu()">MAIN MENU</button>
  </div>
</div>
<div id="overlay">
  <div id="menu-bg"></div>
  <div id="menu-grid"></div>
  <div id="menu-glow"></div>
  <div class="menu-content">
    <div class="menu-logo">BR<span>EACH</span></div>
    <div class="menu-sub">Tactical Team Deathmatch</div>
    <input class="menu-input" id="name-input" placeholder="Operative name" maxlength="16" autocomplete="off">
    <button class="menu-btn primary" onclick="startSolo()">Solo vs Bots</button>
    <button class="menu-btn" onclick="startMulti()">Online Multiplayer</button>
    <div class="menu-hints">
      <kbd>WASD</kbd> move · <kbd>Mouse</kbd> aim · <kbd>LMB</kbd> fire · <kbd>RMB</kbd> ADS<br>
      <kbd>Shift</kbd> sprint · <kbd>R</kbd> reload · <kbd>1</kbd><kbd>2</kbd><kbd>3</kbd> weapons · <kbd>Tab</kbd> scoreboard
    </div>
  </div>
  <div class="menu-footer">BREACH v1.0 — DEPLOY ON RAILWAY</div>
</div>
<script>
const CELL=64, MAP_W=32, MAP_H=32, ATTACK=0, DEFEND=1, SCORE_LIMIT=30;
let W=window.innerWidth, H=window.innerHeight;
const RAYS=280, FOV=0.66, MAX_DIST=900;
const PLAYER_R=14, MOVE_SPEED=3.2, SPRINT_MULT=1.5;

const WEAPONS={
  m4a1:{name:'M4A1',dmg:28,spread:0.018,range:900,rpm:600,mag:30,reserve:90},
  pistol:{name:'P226',dmg:22,spread:0.035,range:450,rpm:400,mag:15,reserve:45},
  dmr:{name:'DMR',dmg:55,spread:0.008,range:1100,rpm:180,mag:10,reserve:40},
};

function getDefaultMap(){
  const N=32, map=Array.from({length:N},()=>Array(N).fill(0));
  for(let i=0;i<N;i++){map[0][i]=1;map[N-1][i]=1;map[i][0]=1;map[i][N-1]=1;}
  const fill=(x1,y1,x2,y2,t)=>{for(let y=y1;y<=y2;y++)for(let x=x1;x<=x2;x++)map[y][x]=t;};
  fill(10,10,21,10,1);fill(10,21,21,21,1);fill(10,11,10,20,1);fill(21,11,21,20,1);
  map[15][10]=4;map[16][10]=4;map[15][21]=4;map[16][21]=4;
  map[10][15]=4;map[10][16]=4;map[21][15]=4;map[21][16]=4;
  fill(3,8,3,23,2);fill(6,8,6,23,2);fill(N-4,8,N-4,23,2);fill(N-7,8,N-7,23,2);
  for(let y=12;y<=19;y++){if(y!==15&&y!==16){map[y][8]=1;map[y][N-9]=1;}}
  [[14,14],[17,14],[14,17],[17,17],[15,15],[16,16],[13,15],[18,15],[15,8],[16,8],[15,N-9],[16,N-9],[12,12],[19,12],[12,19],[19,19]].forEach(([x,y])=>map[y][x]=3);
  for(let y=11;y<=20;y++){for(let x=1;x<=5;x++)map[y][x]=0;for(let x=N-6;x<=N-2;x++)map[y][x]=0;}
  map[15][5]=0;map[16][5]=0;map[15][N-6]=0;map[16][N-6]=0;
  return map;
}

let wallState, entities=[], local, gameRunning=false, soloMode=false, ws=null, myId=null;
let scores={[ATTACK]:0,[DEFEND]:0}, killFeed=[], gameOver=false, keys={}, mouseDown=false, adsHeld=false;
let prevT=0, gameTime=0, screenShake=0, weaponRecoil=0, weaponSway=0, crosshairSpread=0;
let hitMarkerTimer=0, muzzleTimer=0, particles=[], ambientDust=[], pingMs=null, pingTimer=0;
let scoreboardOpen=false, footstepTimer=0, audioCtx=null;

for(let i=0;i<100;i++) ambientDust.push({x:Math.random(),y:Math.random(),z:Math.random()*0.5+0.5,speed:0.2+Math.random()*0.4});

const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const mmCanvas=document.getElementById('mm'), mmCtx=mmCanvas.getContext('2d');

function resize(){
  W=window.innerWidth; H=window.innerHeight;
  canvas.width=W; canvas.height=H;
}
resize();
window.addEventListener('resize',resize);

function initAudio(){
  if(audioCtx) return;
  try{ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
}
function playTone(freq,dur,type='square',vol=0.08){
  if(!audioCtx) return;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime+dur);
}
function playGunshot(weapon){
  if(!audioCtx) return;
  const w=WEAPONS[weapon]||WEAPONS.m4a1;
  const base=w.name==='P226'?180:120;
  playTone(base+Math.random()*40,0.06,'sawtooth',0.06);
  playTone(60+Math.random()*20,0.12,'square',0.04);
}
function playHit(){ playTone(800,0.05,'sine',0.05); }
function playFootstep(){ playTone(80+Math.random()*30,0.04,'triangle',0.03); }
function playReload(){ playTone(400,0.08,'sine',0.04); setTimeout(()=>playTone(520,0.06,'sine',0.04),200); }

function isBlocking(c){return c===1||c===2||c===3;}
function spawnTeam(team){
  const midY=(MAP_H/2)*CELL;
  return team===ATTACK?{x:2.5*CELL,y:midY,angle:0}:{x:(MAP_W-2.5)*CELL,y:midY,angle:Math.PI};
}
function makePlayer(id,name,team,isBot=false){
  const s=spawnTeam(team);
  return{id,name,team,x:s.x,y:s.y,angle:s.angle,health:100,alive:true,weapon:'m4a1',
    ammo:WEAPONS.m4a1.mag,reserve:WEAPONS.m4a1.reserve,aiming:false,shootCooldown:0,
    reloading:false,reloadTimer:0,reloadMax:90,bobAmt:0,bobPhase:0,kills:0,deaths:0,isBot,
    aiTimer:0,aiTarget:null,respawnAt:0};
}
function resetGame(){
  wallState=getDefaultMap().map(r=>r.slice());
  entities=[]; scores={[ATTACK]:0,[DEFEND]:0}; killFeed=[]; gameOver=false;
  local=makePlayer('local','You',ATTACK);
  local.isBot=false;
}
function updateTeamBadge(){
  const el=document.getElementById('team-badge');
  el.textContent=local.team===ATTACK?'ATTACK':'DEFEND';
  el.className=local.team===ATTACK?'attack':'defend';
}
function startSolo(){
  initAudio();
  const name=document.getElementById('name-input').value.trim()||'You';
  resetGame(); soloMode=true; local.name=name; local.team=ATTACK;
  entities.push(local);
  for(let i=0;i<4;i++) entities.push(makePlayer('enemy'+i,'Hostile '+(i+1),DEFEND,true));
  for(let i=0;i<2;i++) entities.push(makePlayer('ally'+i,'Ally '+(i+1),ATTACK,true));
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('ping').style.display='none';
  gameRunning=true; updateTeamBadge(); updateWeaponSlots();
  requestAnimationFrame(loop);
}
function startMulti(){
  initAudio();
  const name=document.getElementById('name-input').value.trim()||'Operative';
  resetGame(); soloMode=false; local.name=name;
  const proto=location.protocol==='https:'?'wss:':'ws:';
  ws=new WebSocket(proto+'//'+location.host);
  ws.onopen=()=>{
    ws.send(JSON.stringify({type:'setName',name}));
    document.getElementById('ping').style.display='block';
  };
  ws.onmessage=(e)=>handleNet(JSON.parse(e.data));
  ws.onclose=()=>{if(gameRunning){gameRunning=false;showMenu();}};
  document.getElementById('overlay').classList.add('hidden');
  gameRunning=true;
  requestAnimationFrame(loop);
}
function showMenu(){
  gameRunning=false; gameOver=false; scoreboardOpen=false;
  document.getElementById('overlay').classList.remove('hidden');
  document.getElementById('gameover').classList.remove('show');
  document.getElementById('death-overlay').classList.remove('show');
  document.getElementById('scoreboard').classList.remove('show');
  if(ws){ws.close();ws=null;}
  if(document.pointerLockElement) document.exitPointerLock();
}
function switchWeapon(key){
  if(!local||!WEAPONS[key]) return;
  local.weapon=key;
  local.ammo=WEAPONS[key].mag;
  local.reserve=WEAPONS[key].reserve;
  local.reloading=false;
  updateAmmoUI(); updateWeaponSlots();
}
function updateWeaponSlots(){
  document.querySelectorAll('.slot').forEach(s=>{
    s.classList.toggle('active',s.dataset.w===local.weapon);
  });
}
function handleNet(msg){
  switch(msg.type){
    case 'init':
      myId=msg.id; wallState=msg.map; scores=msg.scores; killFeed=msg.killFeed||[];
      local=makePlayer(myId,local.name,msg.team);
      entities=msg.players.filter(p=>p.id!==myId).map(p=>({...p,isBot:!!p.isBot}));
      gameOver=msg.gameOver; updateScores(); updateTeamBadge(); renderKillfeed(); updateWeaponSlots();
      break;
    case 'tick':
      scores=msg.scores; killFeed=msg.killFeed||[]; gameOver=msg.gameOver;
      if(msg.map) wallState=msg.map;
      const remote=msg.players.filter(p=>p.id!==myId);
      entities=remote.map(p=>({...p,isBot:!!p.isBot}));
      const me=msg.players.find(p=>p.id===myId);
      if(me){
        const wasAlive=local.alive;
        Object.assign(local,me);
        if(wasAlive&&!local.alive) document.getElementById('death-overlay').classList.add('show');
        if(!wasAlive&&local.alive) document.getElementById('death-overlay').classList.remove('show');
      }
      updateScores(); renderKillfeed();
      if(gameOver) showGameOver(msg.scores[ATTACK]>msg.scores[DEFEND]?ATTACK:DEFEND);
      break;
    case 'pong':
      pingMs=Math.round(performance.now()-msg.t);
      break;
    case 'join':
      if(msg.player&&msg.player.id!==myId) entities.push({...msg.player,isBot:!!msg.player.isBot});
      break;
    case 'leave':
      entities=entities.filter(e=>e.id!==msg.id);
      break;
    case 'hit':
      if(msg.targetId===myId){local.health=msg.health;flashDamage();updateHealthUI();}
      else{
        const t=entities.find(e=>e.id===msg.targetId);
        if(t) t.health=msg.health;
        if(msg.shooterId===myId) showHitMarker(msg.headshot);
      }
      break;
    case 'kill':
      addKillEntry(msg);
      if(msg.victimId===myId){
        local.alive=false;
        local.respawnAt=performance.now()+5000;
        document.getElementById('death-overlay').classList.add('show');
      }
      break;
    case 'wallBreak':
      if(wallState[msg.my]!==undefined) wallState[msg.my][msg.mx]=0;
      break;
    case 'gameOver':
      gameOver=true; showGameOver(msg.winner); break;
  }
}

function castRay(angle){
  const sin=Math.sin(angle), cos=Math.cos(angle);
  let mx=Math.floor(local.x/CELL), my=Math.floor(local.y/CELL);
  const deltaDistX=Math.abs(1/(cos||1e-9)), deltaDistY=Math.abs(1/(sin||1e-9));
  let stepX,stepY,sideDistX,sideDistY;
  if(cos<0){stepX=-1;sideDistX=(local.x/CELL-mx)*deltaDistX;}else{stepX=1;sideDistX=(mx+1-local.x/CELL)*deltaDistX;}
  if(sin<0){stepY=-1;sideDistY=(local.y/CELL-my)*deltaDistY;}else{stepY=1;sideDistY=(my+1-local.y/CELL)*deltaDistY;}
  let dist=0, side=0, hitType=0, wallX=0;
  while(dist<MAX_DIST){
    if(sideDistX<sideDistY){sideDistX+=deltaDistX;mx+=stepX;side=0;}
    else{sideDistY+=deltaDistY;my+=stepY;side=1;}
    const cell=(my>=0&&my<MAP_H&&mx>=0&&mx<MAP_W)?wallState[my][mx]:1;
    if(isBlocking(cell)){
      const d=side===0?sideDistX-deltaDistX:sideDistY-deltaDistY;
      dist=d*CELL; hitType=cell; break;
    }
    dist=Math.min(sideDistX,sideDistY)*CELL;
  }
  return {dist:Math.min(dist,MAX_DIST),type:hitType,side,wallX};
}
function canMove(nx,ny){
  const r=PLAYER_R;
  for(const [cx,cy] of [[nx-r,ny-r],[nx+r,ny-r],[nx-r,ny+r],[nx+r,ny+r]]){
    const mx=Math.floor(cx/CELL), my=Math.floor(cy/CELL);
    if(mx<0||my<0||mx>=MAP_W||my>=MAP_H||isBlocking(wallState[my][mx])) return false;
  }
  return true;
}
function castRayFrom(ox,oy,angle,maxDist){
  const sin=Math.sin(angle), cos=Math.cos(angle);
  let mx=Math.floor(ox/CELL), my=Math.floor(oy/CELL);
  const deltaDistX=Math.abs(1/(cos||1e-9)), deltaDistY=Math.abs(1/(sin||1e-9));
  let stepX,stepY,sideDistX,sideDistY;
  if(cos<0){stepX=-1;sideDistX=(ox/CELL-mx)*deltaDistX;}else{stepX=1;sideDistX=(mx+1-ox/CELL)*deltaDistX;}
  if(sin<0){stepY=-1;sideDistY=(oy/CELL-my)*deltaDistY;}else{stepY=1;sideDistY=(my+1-oy/CELL)*deltaDistY;}
  let dist=0, hitMx=mx, hitMy=my, hitType=0;
  while(dist<maxDist){
    if(sideDistX<sideDistY){sideDistX+=deltaDistX;mx+=stepX;}else{sideDistY+=deltaDistY;my+=stepY;}
    const cell=(my>=0&&my<MAP_H&&mx>=0&&mx<MAP_W)?wallState[my][mx]:1;
    if(isBlocking(cell)){hitMx=mx;hitMy=my;hitType=cell;dist=(sideDistX<sideDistY?sideDistX-deltaDistX:sideDistY-deltaDistY)*CELL;break;}
    dist=Math.min(sideDistX,sideDistY)*CELL;
  }
  return {dist,hitMx,hitMy,mx:hitMx,my:hitMy,type:hitType};
}
function shootEntity(shooter,angle){
  const wpn=WEAPONS[shooter.weapon];
  const spread=wpn.spread*(shooter.aiming?0.35:1);
  const ray=angle+(Math.random()-0.5)*spread*2;
  if(shooter===local){
  if(!soloMode&&ws&&ws.readyState===1){
      ws.send(JSON.stringify({type:'shoot',angle:ray,weapon:shooter.weapon}));
      return;
    }
  }
  if(!soloMode) return;
  let best=null,bestD=Infinity;
  for(const en of entities){
    if(en.id===shooter.id||!en.alive||en.team===shooter.team) continue;
    const dx=en.x-shooter.x, dy=en.y-shooter.y, dist=Math.hypot(dx,dy);
    if(dist>wpn.range) continue;
    let a=Math.atan2(dy,dx)-ray;
    while(a>Math.PI)a-=Math.PI*2; while(a<-Math.PI)a+=Math.PI*2;
    if(Math.abs(a)>Math.atan2(PLAYER_R+8,dist)) continue;
    const wh=castRayFrom(shooter.x,shooter.y,Math.atan2(dy,dx),dist);
    if(wh.dist<dist-8) continue;
    if(dist<bestD){bestD=dist;best=en;}
  }
  const wallHit=castRayFrom(shooter.x,shooter.y,ray,wpn.range);
  if(wallHit.type===3){
    wallState[wallHit.my][wallHit.mx]=0;
    for(let i=0;i<18;i++) particles.push({x:W*0.5+(Math.random()-0.5)*80,y:H*0.45+(Math.random()-0.5)*60,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6-2,life:25,maxLife:35,type:'impact',hue:30});
    screenShake=Math.min(screenShake+6,14);
  }
  if(best){
    const hs=Math.abs(Math.atan2(best.y-shooter.y,best.x-shooter.x)-ray)<0.03;
    const dmg=hs?wpn.dmg*2.5:wpn.dmg;
    best.health=Math.max(0,best.health-dmg);
    if(shooter===local){showHitMarker(hs);spawnBloodParticles(best.x,best.y);}
    if(best.health<=0&&best.alive){
      best.alive=false; best.deaths++; shooter.kills++;
      scores[shooter.team]++;
      addKillEntry({killer:shooter.name,victim:best.name,headshot:hs,weapon:shooter.weapon});
      best.respawnAt=performance.now()+5000;
      if(best===local) document.getElementById('death-overlay').classList.add('show');
      if(shooter.team===ATTACK&&scores[ATTACK]>=SCORE_LIMIT) endSolo(ATTACK);
      if(shooter.team===DEFEND&&scores[DEFEND]>=SCORE_LIMIT) endSolo(DEFEND);
    }
    updateScores();
  }
}

const texPalettes={
  1:{light:[78,74,68],dark:[52,48,44],accent:[98,92,85]},
  2:{light:[62,82,58],dark:[44,58,40],accent:[78,105,70]},
  3:{light:[95,68,50],dark:[65,45,32],accent:[118,82,58]},
  4:{light:[48,48,48],dark:[28,28,28],accent:[62,62,62]},
};
function sampleWallTexture(type,side,wallX,row){
  const pal=texPalettes[type]||texPalettes[1];
  const base=side===1?pal.dark:pal.light;
  let r=base[0],g=base[1],b=base[2];
  const wy=row%8;
  if(type===1){if((Math.floor(wallX*16)+wy)%2===0){r=pal.accent[0];g=pal.accent[1];b=pal.accent[2];}}
  else if(type===2){if(Math.floor(wallX*6)%3===1){r+=10;g+=14;b+=6;}}
  else if(type===3){if(Math.floor(wallX*12)%2){r+=14;g+=10;b+=5;}}
  if(wy===0||wy===7){r*=0.72;g*=0.72;b*=0.72;}
  return [r,g,b];
}
function renderSky(bob){
  const horizon=H/2+bob;
  const g=ctx.createLinearGradient(0,0,0,horizon);
  g.addColorStop(0,'#04060c');g.addColorStop(0.5,'#101828');g.addColorStop(1,'#1a2840');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,horizon);
  for(let i=0;i<80;i++){
    const sx=((i*137.5+gameTime*0.015)%1)*W, sy=((i*97.3)%1)*horizon*0.9;
    ctx.fillStyle=`rgba(200,210,255,${0.2+0.4*Math.sin(gameTime*0.002+i)})`;

}
function renderWorld(bob){
  const fov=local.aiming?FOV*0.55:FOV, horizon=H/2+bob;
  renderSky(bob);
  const zBuf=new Float32Array(RAYS), rayW=Math.ceil(W/RAYS)+1;
  for(let i=0;i<RAYS;i++){
    const angle=local.angle-fov/2+(i/RAYS)*fov;
    const {dist,type,side,wallX}=castRay(angle);
    zBuf[i]=dist;
    if(type===0) continue;
    const wallH=Math.min(H*2,(CELL/dist)*W*0.75), top=horizon-wallH/2;
    const br=Math.max(0.12,1-dist/MAX_DIST), x0=i*(W/RAYS);
    const [tm,tg,tb]=sampleWallTexture(type,side,wallX,4);
    const [tt,ttg,ttb]=sampleWallTexture(type,side,wallX,0);
    const [tb2,tbg,tbb]=sampleWallTexture(type,side,wallX,7);
    let r=Math.floor(tm*br), g=Math.floor(tg*br), b=Math.floor(tb*br);
    const grad=ctx.createLinearGradient(x0,top,x0,top+wallH);
    grad.addColorStop(0,`rgb(${Math.floor(tt*br)},${Math.floor(ttg*br)},${Math.floor(ttb*br)})`);
    grad.addColorStop(0.5,`rgb(${r},${g},${b})`);
    grad.addColorStop(1,`rgb(${Math.floor(tb2*br*0.8)},${Math.floor(tbg*br*0.8)},${Math.floor(tbb*br*0.8)})`);
    ctx.fillStyle=grad;ctx.fillRect(x0,top,rayW,wallH);
    if(side===0){ctx.fillStyle=`rgba(255,255,255,${0.05*br})`;ctx.fillRect(x0,top,1,wallH);}
    ctx.fillStyle=`rgba(0,0,0,${0.25*(1-br)})`;ctx.fillRect(x0,top,rayW,wallH);
  }
  const cosA=Math.cos(local.angle), sinA=Math.sin(local.angle);
  for(let y=Math.ceil(horizon);y<H;y+=2){
    const rowDist=(H*0.5)/(y-horizon);
    if(rowDist<=0||rowDist>MAX_DIST) continue;
    const floorStep=CELL/rowDist;
    let floorX=local.x+Math.cos(local.angle-Math.PI/2)*rowDist;
    let floorY=local.y+Math.sin(local.angle-Math.PI/2)*rowDist;
    const stepX=cosA*floorStep, stepY=sinA*floorStep;
    for(let x=0;x<W;x+=2){
      const cellX=Math.floor(floorX/CELL), cellY=Math.floor(floorY/CELL);
      const checker=(cellX+cellY)%2;
      const fade=Math.max(0.15,1-rowDist/MAX_DIST);
      const line=Math.abs((floorX%CELL)-CELL/2)<4||Math.abs((floorY%CELL)-CELL/2)<4;
      const base=checker?20:14;
      const r=Math.floor((line?base+10:base)*fade), g=Math.floor((line?base+8:base+2)*fade), b=Math.floor((line?base+6:base+4)*fade);
      ctx.fillStyle=`rgb(${r},${g},${b})`;ctx.fillRect(x,y,2,2);
      floorX+=stepX; floorY+=stepY;
    }
  }
  const sorted=entities.filter(e=>e.alive).sort((a,b)=>{
    const da=(a.x-local.x)**2+(a.y-local.y)**2, db=(b.x-local.x)**2+(b.y-local.y)**2;
    return db-da;
  });
  for(const en of sorted){
    const dx=en.x-local.x, dy=en.y-local.y, dist=Math.hypot(dx,dy);
    if(dist<20) continue;
    let ang=Math.atan2(dy,dx)-local.angle;
    while(ang>Math.PI)ang-=Math.PI*2; while(ang<-Math.PI)ang+=Math.PI*2;
    if(Math.abs(ang)>fov*0.55) continue;
    const scrX=W*(0.5+ang/fov);
    let i0=Math.max(0,Math.floor((ang/fov+0.5)*RAYS));
    if(dist>zBuf[Math.min(i0,RAYS-1)]) continue;
    const h=Math.min(H*1.5,(CELL/dist)*W*0.95), top=horizon-h/2, sprW=h*0.42;
    const br=Math.max(0,1-dist/650);
    const enemy=en.team!==local.team;
    const tc=enemy?[85*br,38*br,38*br]:[38*br,68*br,95*br];
    const tc2=enemy?[58*br,26*br,26*br]:[26*br,46*br,68*br];
    const bobSpr=Math.sin(gameTime*0.008+en.x*0.01)*3, sx=scrX-sprW/2, st=top+bobSpr;
    ctx.fillStyle=`rgba(0,0,0,${0.45*br})`;ctx.fillRect(sx+2,st+h*0.9,sprW,h*0.05);
    ctx.fillStyle=`rgb(${tc2[0]},${tc2[1]},${tc2[2]})`;ctx.fillRect(sx,st+h*0.76,sprW*0.75,h*0.16);
    ctx.fillStyle=`rgb(${tc[0]},${tc[1]},${tc[2]})`;ctx.fillRect(sx+sprW*0.12,st+h*0.2,sprW*0.76,h*0.6);
    ctx.fillStyle=`rgba(${tc[0]+30},${tc[1]+20},${tc[2]+15},1)`;ctx.fillRect(scrX-sprW*0.3,st,sprW*0.6,h*0.22);
    if(en.health<100){ctx.fillStyle='#ef4444';ctx.fillRect(sx,st-5,sprW*(en.health/100),3);}
    if(en.isBot){ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='9px sans-serif';ctx.fillText('AI',sx,st-8);}
  }
  renderParticles2D(fov,bob);
}
function renderParticles2D(fov2,bob){
  const horizon=H/2+bob;
  particles.forEach(p=>{
    if(p.type==='blood3d'){
      p.x+=p.vx; p.y+=p.vy; p.vy*=0.95;
      const dx=p.x-local.x, dy=p.y-local.y, dist=Math.hypot(dx,dy);

  document.getElementById('sb-body').innerHTML=all.map(p=>`
    <tr class="${p.isBot?'bot-row':''}">
      <td>${p.name}${p.id===myId?' (you)':''}</td>
      <td>${p.kills||0}</td>
      <td>${p.deaths||0}</td>
      <td style="color:${p.team===ATTACK?'#ef4444':'#3b82f6'}">${p.team===ATTACK?'ATK':'DEF'}</td>
    </tr>`).join('');
}
function updateBots(dt){
  for(const bot of entities.filter(e=>e.isBot&&e.alive)){
    bot.aiTimer-=dt;
    if(bot.aiTimer<=0){
      bot.aiTimer=25+Math.random()*50;
      const enemies=[local,...entities].filter(e=>e.alive&&e.team!==bot.team);
      bot.aiTarget=enemies[Math.floor(Math.random()*enemies.length)]||null;
    }
    if(bot.aiTarget&&bot.aiTarget.alive){
      const dx=bot.aiTarget.x-bot.x, dy=bot.aiTarget.y-bot.y;
      bot.angle=Math.atan2(dy,dx);
      const dist=Math.hypot(dx,dy);
      const spd=MOVE_SPEED*0.7*dt;
      const nx=bot.x+Math.cos(bot.angle)*spd, ny=bot.y+Math.sin(bot.angle)*spd;
      if(dist>160&&canMoveAt(nx,bot.y,bot)) bot.x=nx;
      if(dist>160&&canMoveAt(bot.x,ny,bot)) bot.y=ny;
      bot.aiming=dist<400;
      if(dist<480&&bot.shootCooldown<=0&&Math.random()<0.1){
        bot.shootCooldown=Math.ceil(60/(WEAPONS[bot.weapon].rpm/60));
        shootEntity(bot,bot.angle+(Math.random()-0.5)*0.12);
      }
    }
    if(bot.shootCooldown>0) bot.shootCooldown-=dt;
  }
}
function canMoveAt(nx,ny,who){
  const r=PLAYER_R;
  for(const [cx,cy] of [[nx-r,ny-r],[nx+r,ny-r],[nx-r,ny+r],[nx+r,ny+r]]){
    const mx=Math.floor(cx/CELL), my=Math.floor(cy/CELL);
    if(mx<0||my<0||mx>=MAP_W||my>=MAP_H||isBlocking(wallState[my][mx])) return false;
  }
  return true;
}
function updatePing(){
  if(soloMode||!ws||ws.readyState!==1) return;
  pingTimer+=1;
  if(pingTimer>90){
    pingTimer=0;
    ws.send(JSON.stringify({type:'ping',t:performance.now()}));
  }
  const el=document.getElementById('ping');
  if(pingMs==null){el.textContent='— ms';el.className='';return;}
  el.textContent=pingMs+' ms';
  el.className=pingMs<80?'good':pingMs<150?'mid':'bad';
}
function loop(ts){
  if(!gameRunning){
    ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
    requestAnimationFrame(loop);return;
  }
  const dt=Math.min((ts-prevT)/16.67,3); prevT=ts; gameTime=ts;
  if(local.shootCooldown>0) local.shootCooldown-=dt;
  if(muzzleTimer>0) muzzleTimer-=dt;
  if(hitMarkerTimer>0){hitMarkerTimer-=dt;if(hitMarkerTimer<=0)document.getElementById('hitmarker').style.opacity='0';}
  weaponRecoil*=0.82; weaponSway=(keys['KeyW']||keys['KeyS']||keys['KeyA']||keys['KeyD'])?3:1.2;
  crosshairSpread*=0.85; screenShake*=0.88;
  particles.forEach(p=>{ if(p.life!==undefined){p.x+=(p.vx||0);p.y+=(p.vy||0);p.vy=(p.vy||0)+0.15;p.life-=dt;} });
  for(let i=particles.length-1;i>=0;i--) if(particles[i].life<=0) particles.splice(i,1);

  const moving=keys['KeyW']||keys['KeyS']||keys['KeyA']||keys['KeyD'];
  const sprint=moving&&(keys['ShiftLeft']||keys['ShiftRight'])&&!local.aiming;

  if(local.alive&&!gameOver){
    const spd=MOVE_SPEED*(sprint?SPRINT_MULT:1)*dt;
    let nx=local.x, ny=local.y;
    if(keys['KeyW']){nx+=Math.cos(local.angle)*spd;ny+=Math.sin(local.angle)*spd;}
    if(keys['KeyS']){nx-=Math.cos(local.angle)*spd;ny-=Math.sin(local.angle)*spd;}
    if(keys['KeyA']){nx+=Math.cos(local.angle-Math.PI/2)*spd;ny+=Math.sin(local.angle-Math.PI/2)*spd;}
    if(keys['KeyD']){nx+=Math.cos(local.angle+Math.PI/2)*spd;ny+=Math.sin(local.angle+Math.PI/2)*spd;}
    if(canMove(nx,local.y)) local.x=nx;
    if(canMove(local.x,ny)) local.y=ny;
    if(moving){footstepTimer-=dt;if(footstepTimer<=0){footstepTimer=sprint?8:14;playFootstep();}}
    local.bobPhase+=dt*0.2*(moving?1.2:0.3);
    local.bobAmt=Math.sin(local.bobPhase)*(sprint?6:4);
    local.aiming=adsHeld;
    if(mouseDown&&local.shootCooldown<=0) tryShoot();
    if(local.reloading){
      local.reloadTimer-=dt; updateReloadUI();
      if(local.reloadTimer<=0){
        const w=WEAPONS[local.weapon], need=w.mag-local.ammo, take=Math.min(need,local.reserve);
        local.ammo+=take; local.reserve-=take; local.reloading=false; updateAmmoUI();
      }
    }
    if(!soloMode&&ws&&ws.readyState===1){
      ws.send(JSON.stringify({type:'move',x:local.x,y:local.y,angle:local.angle,aiming:local.aiming,weapon:local.weapon}));
    }
  } else if(!local.alive){
    const left=Math.max(0,Math.ceil((local.respawnAt-ts)/1000));
    document.getElementById('respawn-timer').textContent=left>0?`Respawning in ${left}…`:'Respawning…';
    if(local.respawnAt&&ts>=local.respawnAt&&soloMode){
      const s=spawnTeam(local.team);
      local.x=s.x;local.y=s.y;local.angle=s.angle;
      local.health=100;local.alive=true;local.ammo=WEAPONS[local.weapon].mag;
      document.getElementById('death-overlay').classList.remove('show');
    }
  }

  if(soloMode) updateBots(dt);
  for(const e of entities){
    if(!e.alive&&e.respawnAt&&ts>=e.respawnAt&&e.isBot&&soloMode){
      const s=spawnTeam(e.team); e.x=s.x;e.y=s.y;e.health=100;e.alive=true;
    }
  }

  updatePing();
  const bob=local.bobAmt||0;
  const shakeX=(Math.random()-0.5)*screenShake, shakeY=(Math.random()-0.5)*screenShake;
  ctx.save();ctx.translate(shakeX,shakeY);
  renderWorld(bob); renderGun(bob);
  const vig=ctx.createRadialGradient(W/2,H/2,H*0.15,W/2,H/2,H*0.9);
  vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,0.4)');
  ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);
  ctx.restore();
  renderMinimap(); renderCompass();
  if(scoreboardOpen) renderScoreboard();
  const ch=document.getElementById('crosshair');
  ch.style.opacity=local.aiming&&local.alive?'0.4':'1';
  ch.style.transform=`translate(-50%,-50%) scale(${local.aiming?0.6:1+crosshairSpread*0.02})`;
  document.getElementById('ads-overlay').style.display=local.aiming&&local.alive?'block':'none';
  requestAnimationFrame(loop);
}

document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Digit1') switchWeapon('m4a1');
  if(e.code==='Digit2') switchWeapon('pistol');
  if(e.code==='Digit3') switchWeapon('dmr');
  if(e.code==='KeyR') startReload();
  if(e.code==='Tab'){e.preventDefault();scoreboardOpen=true;document.getElementById('scoreboard').classList.add('show');renderScoreboard();}
});
document.addEventListener('keyup',e=>{
  keys[e.code]=false;
  if(e.code==='Tab'){scoreboardOpen=false;document.getElementById('scoreboard').classList.remove('show');}
});
document.addEventListener('mousedown',e=>{
  if(e.button===0){mouseDown=true;if(gameRunning)tryShoot();}
  if(e.button===2){adsHeld=true;e.preventDefault();}
});
document.addEventListener('mouseup',e=>{
  if(e.button===0) mouseDown=false;
  if(e.button===2) adsHeld=false;
});
document.addEventListener('mousemove',e=>{
  if(!gameRunning||!local?.alive||document.pointerLockElement!==canvas) return;
  local.angle+=e.movementX*0.0022;
});
document.addEventListener('contextmenu',e=>e.preventDefault());
canvas.addEventListener('click',()=>{initAudio();canvas.requestPointerLock();});

resetGame();
requestAnimationFrame(loop);
</script>
</body>
